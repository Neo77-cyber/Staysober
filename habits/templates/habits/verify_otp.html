
<div class="dashboard" style="max-width: 420px; margin: 0 auto; padding: 3rem 1.25rem;">
    <h1 style="font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem;">Check WhatsApp</h1>
    <p style="color: #6b7280; margin-bottom: 2rem;">
        We sent a 6-digit code to your WhatsApp. Enter it below.
    </p>

    {% if messages %}
        {% for message in messages %}
            <div style="padding: 0.75rem 1rem; border-radius: 10px; margin-bottom: 1rem;
                background: {% if message.tags == 'error' %}#fef2f2{% else %}#f0fdf4{% endif %};
                color: {% if message.tags == 'error' %}#dc2626{% else %}#16a34a{% endif %};
                font-weight: 600; font-size: 0.9rem;">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'verify_otp' %}">
        {% csrf_token %}
        <input
            type="text"
            name="otp"
            maxlength="6"
            inputmode="numeric"
            autocomplete="one-time-code"
            placeholder="6-digit code"
            autofocus
            style="width: 100%; padding: 1rem; font-size: 1.5rem; letter-spacing: 0.5rem;
                   text-align: center; border: 1.5px solid #e5e7eb; border-radius: 14px;
                   font-family: inherit; margin-bottom: 1.25rem;"
        >
        <button type="submit" class="btn" style="width: 100%; background: #22c55e; color: white;
                border: none; padding: 1rem; border-radius: 12px; font-weight: 800;
                font-size: 1rem; cursor: pointer;">
            Verify & Create Account
        </button>
    </form>

    <form method="post" action="{% url 'resend_otp' %}" style="margin-top: 1rem;">
        {% csrf_token %}
        <button type="submit" style="width: 100%; background: white; border: 1px solid #e5e7eb;
                padding: 0.75rem; border-radius: 12px; color: #6b7280; font-weight: 600;
                cursor: pointer; font-family: inherit;">
            Resend code
        </button>
    </form>
</div>
