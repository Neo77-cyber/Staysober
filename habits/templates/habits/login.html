<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turf | Log In</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --error: #ff4d4d;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .hero {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 0;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .phone-container {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .phone-container h3 {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-group {
            display: flex;
            align-items: center;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .input-group:focus-within {
            border-color: var(--primary);
        }

        .prefix {
            padding: 12px;
            background: #334155;
            color: var(--primary);
            font-weight: bold;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .alert {
            background: var(--error);
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            text-align: left;
            border-left: 4px solid #b30000;
        }

        .footer-links {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>TURF</h1>
        <p class="subtitle">Welcome back, Champ. Sign in to check your streaks.</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="phone-container">
                <h3>WhatsApp Number</h3>
                <div class="input-group">
                    <span class="prefix">+234</span>
                    <input type="text" name="identifier" placeholder="8123456789" required 
                           pattern="[0-9]{10}" maxlength="10">
                </div>
            </div>

            <div class="phone-container">
                <h3>Password</h3>
                <div class="input-group">
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit">Unlock Dashboard →</button>
        </form>

        <div class="footer-links">
            Don't have a habit yet? <a href="{% url 'index' %}">Start here</a>
        </div>
    </div>

</body>
</html>
