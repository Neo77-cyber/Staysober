name: Django CI/CD

on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
      SECRET_KEY: ci-secret-key-not-used-in-prod
      DEBUG: "False"
      GEMINI_API_KEY: dummy
      MAINTENANCE_KEY: dummy
      GREEN_API_ID: dummy
      GREEN_API_TOKEN: dummy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Run Django unit + integration tests
        run: python manage.py test habits --verbosity=2 --failfast

      
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium webkit firefox

      - name: Run Playwright E2E tests
        env:
          BASE_URL: https://dear-self.onrender.com
          E2E_TEST_PHONE: ${{ secrets.E2E_TEST_PHONE }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
        run: pytest tests/e2e/ --browser chromium --browser webkit --verbosity=2

  deploy:
    runs-on: ubuntu-latest
    needs: test   
    steps:
      - name: Deploy to Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}